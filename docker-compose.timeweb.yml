services:
  frontend:
    build:
      context: .
      dockerfile: docker/timeweb/frontend.Dockerfile
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: docker/timeweb/backend.Dockerfile
    env_file:
      - .env
    restart: unless-stopped
